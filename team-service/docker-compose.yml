services:
  team-app: 
    build:
      context: .
      dockerfile: Dockerfile
    container_name: team_service
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-dev}
    ports:
      - "${API_PORT}:5050"
    networks:
      - btp-network
    depends_on:
      - db
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
  db:
    image: postgres:16-alpine
    container_name: team_pgdb
    restart: always
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 128M
    volumes:
      - local_pgdata:/var/lib/postgresql/data
    networks:
      - btp-network
  pgadmin:
    image: dpage/pgadmin4
    container_name: team_pgadmin4
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - btp-network
    depends_on:
      - db

volumes:
  local_pgdata:
  pgadmin-data:

networks: 
  btp-network:
    driver: bridge
    external: true