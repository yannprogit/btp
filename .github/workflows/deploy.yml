name: Deploy

on:
  push:
    branches:
      - '**'

env:
  REGISTRY: docker.io

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint frontend
        run: |
          cd frontend
          npm ci
          npm run lint

      - name: Lint api-gateway
        run: |
          cd api-gateway
          npm ci
          npm run lint

      - name: Lint pokeapi-service
        run: |
          cd pokeapi-service
          npm ci
          npm run lint

      - name: Lint team-service
        run: |
          cd team-service
          npm ci
          npm run lint

      - name: Lint user-service
        run: |
          cd user-service
          npm ci
          npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test pokeapi-service
        run: |
          cd pokeapi-service
          npm ci
          npm test -- --runInBand

      - name: Test team-service
        run: |
          cd team-service
          npm ci
          npm test -- --runInBand

      - name: Test user-service
        run: |
          cd user-service
          npm ci
          npm test -- --runInBand

      - name: Test frontend
        run: |
          cd frontend
          npm ci
          npm run test:run

  build:
    name: Build Docker Images
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/btp-frontend:latest

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/btp-api-gateway:latest

      - name: Build and push pokeapi-service
        uses: docker/build-push-action@v5
        with:
          context: ./pokeapi-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/btp-pokeapi-service:latest

      - name: Build and push team-service
        uses: docker/build-push-action@v5
        with:
          context: ./team-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/btp-team-service:latest

      - name: Build and push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/btp-user-service:latest

