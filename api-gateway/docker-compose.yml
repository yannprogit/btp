services:
  api_gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_gateway
    restart: unless-stopped
    networks:
      - btp-network
    environment:
      USERS_SERVICE_URL: ${USERS_SERVICE_URL}
      TEAMS_SERVICE_URL: ${TEAMS_SERVICE_URL}
      API_PORT: ${API_PORT}
    ports:
      - "${API_PORT}:5000"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

networks:
  btp-network:
    driver: bridge
    external: true
